name: Build development copy
on:
    push:
        branches:
            - main

jobs:
    build:
        permissions:
            contents: read
            packages: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install MKDocs and plugins
              run: python -m pip install mkdocs mkdocs-print-site-plugin

            - name: Build site
              run: python -m mkdocs build

            - name: Build Docker image
              run: docker build -t ghcr.io/${{ github.repository_owner }}/f-100d-manual:latest .

            - name: Login to ghcr.io
              run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            - name: Push to ghcr.io
              run: docker push ghcr.io/${{ github.repository_owner }}/f-100d-manual:latest
            
            - name: Delete older versions
              uses: actions/delete-package-versions@v5
              with:
                  package-name: 'f-100d-manual'
                  package-type: 'container'
                  min-versions-to-keep: 1