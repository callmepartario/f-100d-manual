site_name: DCS F-100D Manual
plugins:
    - search
    # - to-pdf: # this seems like the best pdf generator with the material scheme
    #     author: Grinnelli Designs
    #     cover_subtitle: Grinnelli Designs
    #     copywrite: Grinnelli Designs
    
    #- offline
    #- with-pdf:
    #    headless_chrome_path: C:/Program Files/Google/Chrome/Application/chrome.exe
    #    render_js: true
    - print-site:
        print_page_title: 'Manual'
        enumerate_headings: false
        toc_depth: 1

#https://www.mkdocs.org/user-guide/customizing-your-theme/
# see extra css (simplify this later)
# markdown -> ![gunsight](images/AH-1G_M73Reticle.png){:.restricted-img} - thanks hayds
theme:
  name: readthedocs
  custom_dir: 'custom_theme/'  # or any other theme
  features:
    - navigation.instant

# theme:
#     name: material
#     palette: 
#       # Palette toggle for light mode
#       - scheme: default
#         toggle:
#           icon: material/brightness-7 


      #     name: Switch to dark mode

      # # Palette toggle for dark mode
      # - scheme: slate
      #   toggle:
      #     icon: material/brightness-4
      #     name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition

docs_dir: src
use_directory_urls: false

nav:
    - 'index.md'
    - Introduction:
      - Overview: ./Introduction/introduction.md
      - Definitions and Abbreviations: ./Introduction/definitions.md
      - Credits: ./credits.md
    - Cockpit:
      - Instrument Panel: ./Introduction/instrument-panel.md
      - Cockpit Left Side: ./Introduction/cockpit-left.md
      - Cockpit Right Side: ./Introduction/cockpit-right.md
      - Glare Shield and Above: ./Introduction/glare-shield.md
      - Indicator, Caution, & Warning Lights: ./Introduction/lights-overview.md
      - Stick and Throttle: ./Introduction/stick-and-throttle.md
      - Ejection Seat: ./Introduction/ejection-seat.md
    - DCS:
      - Checklist: ./Meta/checklist.md
      - Special Options: ./Introduction/special-options.md
      - Parameters: ./Meta/parameters.md
    - Systems:
      - Aircraft Systems:
        - Engine: ./Engine/engine.md
        - Electrical: ./Electrical/electrical.md
        - Hydraulics: ./Hydraulics/hydraulic.md
        - Fuel: ./Fuel/fuel.md
        - Oxygen System (MD-1 Oxygen Regulator): ./Oxygen System/oxygen.md
        - AN/APX-72 IFF: ./APX-72 IFF/iff.md
      - Navigation Systems:
        - Direction Gyro and Compass: ./DirectionGyroCompass/direction-gyro-and-compass.md
        - B-26 Navigation Computer: ./Navigation Computer/navigation-computer.md
      - Radio Systems:
        - ARC-34 UHF Command Radio: ./ARC-34 Command Radio/command-radio.md
        - ARA-50 ADF System: ./ARA-50 ADF/adf-radio.md
        - ARN-6 Radio Compass: ./ARN-6 Radio Compass/radio-compass.md
        - ARN-72 TACAN: ./ARN-72 TACAN/tacan.md
        - Seek Silence System: ./Seek Silence System/seek-silence.md
      - Lighting Systems:
        - Indicator and Caution Light Panel: ./Lighting System/indicator-caution-light-panel.md
        - Lighting Control Panel: ./Lighting System/lighting-control-panel.md
      - Camera Systems:
        - Gun Camera: ./Gun Camera/gun_camera.md
        - Strike Camera: ./Strike Camera/strike_camera.md
      - Defensive Systems:
        - AN/APR-25 RHAW: ./RHAW/RHAW.md
      - Weapon Systems:
        - Introduction: ./Weapon_System/introduction.md
        - Armament Control Panels: ./Weapon_System/armament-control-panels.md
        - Aircraft Weapons Release System: ./Weapon_System/aircraft-weapons-release-system.md
        - A-4 Gunsight: ./Weapon_System/a-4-gunsight.md
        - Guns: ./Weapon_System/guns.md
        - AIM-9 Sidewinder: ./Weapon_System/aim-9-sidewinder.md
        - AIM-45 Shrike: ./Weapon_System/agm-45-shrike.md
        - AN/AJB-1 Low Altitude Bombing System: ./Weapon_System/low-altitude-bombing-system.md
        - Weapon Release Tables: ./Weapon_System/bomb-rockets.md

    - Procedures:
      - Normal Procedures:
        - Cruise: ./Procedures/Normal/cruise.md
        - Preflight Check: ./Procedures/Normal/preflight.md
        - Startup: ./Procedures/Normal/start.md
        - Taxiing: ./Procedures/Normal/taxi.md
        - Takeoff: ./Procedures/Normal/takeoff.md
        - Afterburner (AB) Operation During Flight: ./Procedures/Normal/afterburner.md
        - Descent: ./Procedures/Normal/descent.md
        - Landing: ./Procedures/Normal/landing.md
        - Go-Around: ./Procedures/Normal/go-around.md
        - Engine Shutdown: ./Procedures/Normal/shutdown.md
      - Weapons Employment:
        - Manual Delivery: ./Weapon_System/Procedures/manual-delivery.md
        - Sidewinders: ./Weapon_System/Procedures/sidewinder.md
      - Emergency Procedures:
        - Takeoff Emergencies:
          - Afterburner Failure During Takeoff: ./Procedures/Emergency/afterburner-takeoff.md
          - Engine Failure During Takeoff: ./Procedures/Emergency/engine-failure-takeoff.md
          - Illumination of the Fuel Valve Fail Light: ./Procedures/Emergency/fuel-valve.md
        - In-flight Emergencies:
          - Air Start: ./Procedures/Emergency/air-start.md
          - Afterburner Failure: ./Procedures/Emergency/afterburner.md
          - Ejection: ./Procedures/Emergency/ejection.md
          - Canopy: ./Procedures/Emergency/canopy.md
          - Engine Failure: ./Procedures/Emergency/engine-failure.md
          - AC Generator: ./Procedures/Emergency/acgen.md
          - Flight Controls: ./Procedures/Emergency/flight-controls.md
          - Fuel System: ./Procedures/Emergency/fuel-system.md
          - Heat and Vent Emergency: ./Procedures/Emergency/heat-vent.md
          - Jettison of External Load: ./Procedures/Emergency/jettison.md
          - Ram-Air Turbine Doors Open: ./Procedures/Emergency/rat.md
          - Spin Recovery: ./Procedures/Emergency/spin.md
          - Utility Hydraulic System Failure: ./Procedures/Emergency/utility-hydraulic.md
          - Yaw and Pitch Damper Emergency: ./Procedures/Emergency/damper.md
        - Landing Emergencies:
